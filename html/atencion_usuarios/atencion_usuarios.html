<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Atención a Usuarios | OPDAPAS Ixtapaluca</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="../../css/estilos_generales.css">
    <link rel="stylesheet" href="../../css/atencion_usuarios/atencion_usuarios.css">
</head>
<body>
    <div class="atencion-container">
        <!-- HEADER PREMIUM UNIFICADO -->
        <div class="page-header-premium">
            <div class="header-glow"></div>
            <div class="header-icon-wrapper">
                <div class="header-icon-pulse"></div>
                <div class="header-icon">
                    <i class="fas fa-headset"></i>
                </div>
            </div>
            <div class="header-text">
                <h1>ATENCIÓN A USUARIOS <span class="header-badge">GESTIÓN INTEGRAL</span></h1>
                <p>Gestión de solicitudes, aprobaciones, visitas técnicas, reportes y ciudadanos</p>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <i class="fas fa-home" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label">Dashboard</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-file-alt" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label" id="totalSolicitudesStat">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-check-circle" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label" id="totalAprobadosStat">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-users" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label" id="totalCiudadanosStat">0</span>
                </div>
            </div>
        </div>

        <!-- NAVEGACIÓN DE MÓDULOS (AHORA CON INICIO) -->
        <div class="modulos-nav">
            <button class="modulo-btn active" data-modulo="inicio">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </button>
            <button class="modulo-btn" data-modulo="solicitudes">
                <i class="fas fa-envelope-open-text"></i>
                <span>Solicitudes</span>
                <span class="badge-count" id="solicitudesCount">0</span>
            </button>
            <button class="modulo-btn" data-modulo="aprobados">
                <i class="fas fa-check-double"></i>
                <span>Aprobados</span>
                <span class="badge-count" id="aprobadosCount">0</span>
            </button>
            <button class="modulo-btn" data-modulo="visitas">
                <i class="fas fa-calendar-check"></i>
                <span>Visitas</span>
                <span class="badge-count" id="visitasCount">0</span>
            </button>
            <button class="modulo-btn" data-modulo="reporte">
                <i class="fas fa-chart-bar"></i>
                <span>Reporte</span>
            </button>
            <button class="modulo-btn" data-modulo="ciudadanos">
                <i class="fas fa-id-card"></i>
                <span>Ciudadanos</span>
                <span class="badge-count" id="ciudadanosCount">0</span>
            </button>
            <button class="modulo-btn" data-modulo="archivo">
                <i class="fas fa-archive"></i>
                <span>Archivo</span>
                <span class="badge-count" id="archivoCount">0</span>
            </button>
        </div>

        <!-- CONTENEDOR DE IFRAME DINÁMICO -->
        <div class="iframe-wrapper">
            <div class="iframe-loading-overlay" id="iframeLoading" style="display: none;">
                <div class="loading-ring">
                    <div></div><div></div><div></div><div></div>
                </div>
                <p>Cargando módulo...</p>
            </div>
            <iframe id="moduloIframe" src="inicio.html" class="modulo-iframe" title="Módulo de Atención a Usuarios"></iframe>
        </div>
    </div>

    <script src="../../js/atencion_usuarios/atencion_usuarios.js"></script>
</body>
</html>
