<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mapa Interno - Pozos | OPDAPAS Ixtapaluca</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- CSS General del Sistema -->
    <link rel="stylesheet" href="../../../../css/estilos_generales.css">

    <!-- CSS Específico de Mapa Interno -->
    <link rel="stylesheet" href="../../../../css/diagnosticos/pozos/mapa_interno/mapa_interno.css">
</head>
<body>

    <!-- PANEL LATERAL (CONTROLES) -->
    <div class="map-panel" id="mapPanel">
        <div class="map-panel-header">
            <h3 class="map-panel-title">
                <i class="fas fa-map"></i> Plan Maestro 2026
            </h3>
            <button class="map-panel-toggle" id="btnTogglePanel" title="Ocultar/Mostrar panel">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        <div class="map-panel-body" id="mapPanelBody">
            <div class="map-btns-header">
                <button class="map-btn-general" id="btnGeneral">
                    <i class="fas fa-power-off"></i> Apagar todo
                </button>
            </div>
            <div id="listaCapas" class="map-lista-capas"></div>
        </div>
    </div>

    <!-- BOTÓN FLOTANTE PARA ABRIR PANEL EN MÓVIL -->
    <button class="map-btn-flotante" id="btnFlotantePanel" title="Abrir panel">
        <i class="fas fa-layer-group"></i>
    </button>

    <!-- BOTÓN CENTRAR MAPA -->
    <button class="map-btn-centro" id="btnCentroMapa" title="Centrar mapa en Ixtapaluca">
        <img src="../../../imagenes/logoOPDAPAS.png" alt="Centrar mapa" onerror="this.src='https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png'">
    </button>

    <!-- CONTENEDOR DEL MAPA -->
    <div id="map"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="../../../js/diagnosticos/pozos/mapa_interno/mapa_interno.js"></script>
</body>
</html>
