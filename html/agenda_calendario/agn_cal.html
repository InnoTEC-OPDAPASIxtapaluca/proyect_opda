<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Agenda y Calendario | OPDAPAS Ixtapaluca</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="../../css/estilos_generales.css">
    <link rel="stylesheet" href="../../css/agenda_calendario/agn_cal.css">
</head>
<body>
    <div class="agenda-calendario-container">
        <!-- HEADER PREMIUM UNIFICADO -->
        <div class="page-header-premium">
            <div class="header-glow"></div>
            <div class="header-icon-wrapper">
                <div class="header-icon-pulse"></div>
                <div class="header-icon">
                    <i class="fas fa-calendar-alt"></i>
                </div>
            </div>
            <div class="header-text">
                <h1>AGENDA Y CALENDARIO <span class="header-badge">GESTIÓN DE TIEMPOS</span></h1>
                <p>Administra tus eventos, citas y programaciones</p>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <i class="fas fa-calendar-week" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label">Gestión</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-list-check" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label" id="totalEventosStat">0</span>
                </div>
            </div>
        </div>

        <!-- NAVEGACIÓN DE MÓDULOS (INICIO, AGENDA, CALENDARIO) -->
        <div class="modulos-nav">
            <button class="modulo-btn active" data-modulo="inicio">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </button>
            <button class="modulo-btn" data-modulo="agenda">
                <i class="fas fa-calendar-check"></i>
                <span>Agenda</span>
            </button>
            <button class="modulo-btn" data-modulo="calendario">
                <i class="fas fa-calendar-alt"></i>
                <span>Calendario</span>
            </button>
        </div>

        <!-- CONTENEDOR PRINCIPAL: VIDEO + IFRAME -->
        <div class="contenedor-principal">
            <!-- Video de fondo con overlay borroso (sin texto) -->
            <div class="video-background" id="videoBackground">
                <video autoplay muted loop playsinline id="bgVideo">
                    <source src="../../videos/agenda-calendario (1).mp4" type="video/mp4">
                    Tu navegador no soporta videos HTML5.
                </video>
                <div class="video-overlay"></div>
            </div>

            <!-- Iframe dinámico (inicialmente oculto) -->
            <div class="iframe-wrapper" id="iframeWrapper" style="display: none;">
                <div class="iframe-loading-overlay" id="iframeLoading" style="display: none;">
                    <div class="loading-ring">
                        <div></div><div></div><div></div><div></div>
                    </div>
                    <p>Cargando módulo...</p>
                </div>
                <iframe id="moduloIframe" class="modulo-iframe" title="Módulo de Agenda y Calendario"></iframe>
            </div>
        </div>
    </div>

    <script src="../../js/agenda_calendario/agn_cal.js"></script>
</body>
</html>
