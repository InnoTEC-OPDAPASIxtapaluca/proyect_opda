<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja Membretada OPDAPAS</title>
    <style>
        /* ===== ESTILOS DIRECTAMENTE EN EL HTML ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: 'Arial', sans-serif;
        }

        /* TAMAÑO CARTA - FORZAR UNA SOLA HOJA */
        .hoja {
            width: 216mm;
            min-height: 279mm;
            height: auto;
            background: white;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
            page-break-after: avoid;
            page-break-inside: avoid;
        }

        /* ===== HEADER SIMPLE ===== */
        .header {
            background: linear-gradient(135deg, #691a30 0%, #4a1121 100%);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #bb9358;
        }

        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header h2 {
            color: #bb9358;
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* ===== CONTENIDO ===== */
        .contenido {
            flex: 1;
            padding: 0.6cm 1cm;
            background: white;
        }

        /* Títulos del reporte */
        .reporte-titulo {
            text-align: center;
            margin-bottom: 0.5cm;
        }

        .reporte-titulo h1 {
            font-size: 22px;
            font-weight: bold;
            color: #691a30;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .reporte-titulo h2 {
            font-size: 15px;
            font-weight: normal;
            color: #bb9358;
            border-bottom: 2px solid #691a30;
            padding-bottom: 6px;
        }

        /* Información del período */
        .info-periodo {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #f5f5f5;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 0.4cm;
            border-left: 5px solid #691a30;
            font-size: 11px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .info-item {
            display: flex;
            gap: 5px;
            flex: 1 1 auto;
        }

        .info-label {
            font-weight: bold;
            color: #691a30;
            white-space: nowrap;
        }

        .info-valor {
            color: #333;
            word-break: break-word;
        }

        /* ===== CONTENEDOR DE TABLA ===== */
        .tabla-container {
            max-height: none;
            overflow: visible;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 0;
        }

        /* Tabla de eventos */
        .tabla-eventos {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            table-layout: fixed;
        }

        .tabla-eventos thead tr {
            background: #691a30;
            color: white;
        }

        .tabla-eventos th {
            padding: 10px 4px;
            text-align: left;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 9px;
            border: 1px solid #4a1121;
        }

        .tabla-eventos td {
            padding: 8px 4px;
            border: 1px solid #ddd;
            color: #333;
            vertical-align: top;
            word-break: break-word;
        }

        .tabla-eventos td.centrado {
            text-align: center;
            vertical-align: middle;
        }

        .tabla-eventos tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        /* Anchos de columna optimizados */
        .tabla-eventos th:nth-child(1),
        .tabla-eventos td:nth-child(1) { width: 11%; }

        .tabla-eventos th:nth-child(2),
        .tabla-eventos td:nth-child(2) { width: 8%; }

        .tabla-eventos th:nth-child(3),
        .tabla-eventos td:nth-child(3) { width: 24%; }

        .tabla-eventos th:nth-child(4),
        .tabla-eventos td:nth-child(4) { width: 42%; }

        .tabla-eventos th:nth-child(5),
        .tabla-eventos td:nth-child(5) { width: 15%; }

        /* ===== FOOTER SIMPLE ===== */
        .footer {
            background: linear-gradient(135deg, #4a1121 0%, #2a0a15 100%);
            padding: 15px;
            text-align: center;
            border-top: 3px solid #bb9358;
            color: rgba(255,255,255,0.7);
            font-size: 9px;
            margin-top: auto;
        }

        .footer p {
            margin: 3px 0;
        }

        .footer .sistema {
            color: #bb9358;
            font-weight: bold;
            font-size: 10px;
        }

        /* ===== ESTILOS PARA IMPRESIÓN ===== */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .hoja {
                box-shadow: none;
                margin: 0;
                width: 100%;
                min-height: 279mm;
                height: auto;
                page-break-after: avoid;
                page-break-inside: avoid;
                page-break-before: avoid;
            }
            
            .header, .footer {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="hoja" id="hojaReporte">
        <!-- HEADER SIMPLE -->
        <div class="header">
            <h1>ROCIO GUZMAN</h1>
            <h2>ROCIO GUZMAN</h2>
        </div>

        <!-- CONTENIDO -->
        <div class="contenido">
            <!-- TÍTULO DEL REPORTE -->
            <div class="reporte-titulo">
                <h1>REPORTE DE ANOTACIONES</h1>
                <h2 id="tituloPeriodo">SISTEMA DE GESTION</h2>
            </div>

            <!-- INFORMACIÓN DEL PERÍODO -->
            <div class="info-periodo">
                <div class="info-item">
                    <span class="info-label">PERÍODO:</span>
                    <span class="info-valor" id="periodo">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">GENERADO EL:</span>
                    <span class="info-valor" id="fechaGeneracion">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">TOTAL EVENTOS:</span>
                    <span class="info-valor" id="totalEventos">0</span>
                </div>
            </div>

            <!-- TABLA DE EVENTOS -->
            <div class="tabla-container">
                <table class="tabla-eventos">
                    <thead>
                        <tr>
                            <th>FECHA</th>
                            <th>HORA</th>
                            <th>TÍTULO</th>
                            <th>DESCRIPCIÓN</th>
                            <th>ARCHIVOS</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <!-- Se llenará dinámicamente -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- FOOTER SIMPLE -->
        <div class="footer">
            <p class="sistema">SISTEMA DE GESTIÓN OPDAPAS</p>
            <p>Dirección General - Documento oficial</p>
            <p>Generado electrónicamente</p>
        </div>
    </div>
</body>
</html>
