<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Agregar Usuario | OPDAPAS Ixtapaluca</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="../../css/estilos_generales.css">
    <link rel="stylesheet" href="../../css/agregar_usuario/agregar_usuario.css">
</head>
<body>
    <div class="agregar-usuario-container">
        <!-- HEADER PREMIUM (Igual al de diagnósticos) -->
        <div class="page-header-premium">
            <div class="header-glow"></div>
            <div class="header-icon-wrapper">
                <div class="header-icon-pulse"></div>
                <div class="header-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
            </div>
            <div class="header-text">
                <h1>AGREGAR USUARIO <span class="header-badge">NUEVO REGISTRO</span></h1>
                <p>Complete los datos del nuevo usuario y asigne permisos de acceso al sistema</p>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <i class="fas fa-users" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label">Gestión</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-shield-alt" style="font-size: 20px; color: var(--color-primary);"></i>
                    <span class="stat-label">Permisos</span>
                </div>
            </div>
        </div>

        <!-- FORMULARIO PRINCIPAL -->
        <form id="formAgregarUsuario" class="form-usuario">
            <!-- DATOS PERSONALES -->
            <div class="form-section">
                <div class="section-title">
                    <i class="fas fa-user-circle"></i>
                    <span>DATOS PERSONALES</span>
                </div>
                
                <div class="form-grid grid-2">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nombre <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ingrese el nombre" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Apellido Paterno <span class="required">*</span></label>
                        <input type="text" id="apellido_paterno" name="apellido_paterno" class="form-control" placeholder="Apellido paterno" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Apellido Materno <span class="required">*</span></label>
                        <input type="text" id="apellido_materno" name="apellido_materno" class="form-control" placeholder="Apellido materno" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> Número de Nómina <span class="required">*</span></label>
                        <input type="text" id="no_nomina" name="no_nomina" class="form-control" placeholder="Ej: 202400123" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="correo" name="correo" class="form-control" placeholder="usuario@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Número Telefónico <span class="required">*</span></label>
                        <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="55 1234 5678" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Área <span class="required">*</span></label>
                        <select id="area" name="area" class="form-control" required>
                            <option value="">Seleccione un área</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-shield"></i> Rol <span class="required">*</span></label>
                        <select id="rol" name="rol" class="form-control" required>
                            <option value="">Seleccione un rol</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN DE PERMISOS (OPCIONAL) -->
            <div class="form-section">
                <div class="section-title">
                    <i class="fas fa-lock-open"></i>
                    <span>PERMISOS (OPCIONAL)</span>
                    <button type="button" id="btnAgregarInterfaz" class="btn-add-permission">
                        <i class="fas fa-plus-circle"></i> AGREGAR INTERFAZ
                    </button>
                </div>
                
                <div id="permisosContainer" class="permisos-container">
                    <!-- Aquí se agregarán dinámicamente las tarjetas de permisos -->
                    <div class="empty-permisos" id="emptyPermisosMsg">
                        <i class="fas fa-shield-alt"></i>
                        <p>No hay permisos configurados</p>
                        <span>Haga clic en "Agregar Interfaz" para asignar permisos</span>
                    </div>
                </div>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <div class="form-actions">
                <button type="button" id="btnCancelar" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="btnGuardar" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Usuario
                </button>
            </div>
        </form>
    </div>

    <!-- MODAL PARA SELECCIONAR CAMPOS POR BOTÓN -->
    <div id="modalCampos" class="modal-campos">
        <div class="modal-campos-content">
            <div class="modal-campos-header">
                <h3><i class="fas fa-check-square"></i> Seleccionar Campos</h3>
                <button type="button" class="modal-close" id="closeModalCampos">&times;</button>
            </div>
            <div class="modal-campos-body" id="modalCamposBody">
                <!-- Aquí se cargan dinámicamente los checkboxes de campos -->
            </div>
            <div class="modal-campos-footer">
                <button type="button" id="btnConfirmarCampos" class="btn-confirm">Confirmar</button>
                <button type="button" id="btnCancelarCampos" class="btn-cancel-modal">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Template para tarjeta de permisos (oculto) -->
    <template id="templatePermisoCard">
        <div class="permiso-card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-window-maximize"></i>
                    <select class="interfaz-select" required style="min-width: 200px;">
                        <option value="">Seleccione Interfaz</option>
                    </select>
                </div>
                <button type="button" class="btn-remove-card" title="Eliminar permisos">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="botones-container">
                    <!-- Aquí se agregarán dinámicamente los botones con sus campos -->
                </div>
            </div>
        </div>
    </template>

    <!-- Template para botón con campos (oculto) -->
    <template id="templateBotonPermiso">
        <div class="boton-permiso-item">
            <div class="boton-header">
                <label class="checkbox-boton">
                    <input type="checkbox" class="boton-checkbox">
                    <span class="boton-nombre"></span>
                </label>
                <button type="button" class="btn-config-campos" title="Configurar campos">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
            <div class="campos-seleccionados" style="display: none;">
                <div class="campos-list"></div>
                <input type="hidden" class="campos-values" value="">
            </div>
        </div>
    </template>

    <script src="../../js/agregar_usuario/agregar_usuario.js"></script>
</body>
</html>
